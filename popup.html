<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
    <style>
      p { font-size: clamp(0.75rem, 4cqi, 1rem); }
    </style>
  </head>
  <body class="popupBody" style="width:300px;">
    <h1>Rabbit Hole Explorer</h1>
    <p>Session status: <span id='SessionStatusText'>Ready</span></p>
    <p>Pages tracked:<span id="PagesTrackedVal">0</span></p>
    <p>Time elapsed:<span id='TimeElapsedVal'></span></p>
    <h2 id='StartTime'></h2>
    <div class='popupActions'>
      <button id='RabbitHole_Record' class='iconButton' aria-label='Start or stop recording'>
        <img id='RabbitHole_Record_Icon' class='iconButtonIcon' src='assets/start_icon.svg' alt=''>
      </button>
      <button id='RabbitHole_Index' class='iconButton' aria-label='Open the explorer'>
        <img id='RabbitHole_Index_Icon' class='iconButtonIcon' src="assets/spiraleyerabbit_40ms.gif" alt=''>
        Home
      </button>
    </div>
    <script src="dist/popup.js"></script>
  </body>
</html>
